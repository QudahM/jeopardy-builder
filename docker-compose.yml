
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jeopardy_user
      POSTGRES_PASSWORD: jeopardy_password
      POSTGRES_DB: jeopardy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "jeopardy_user", "-d", "jeopardy_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_USER: jeopardy_user
      DB_PASSWORD: jeopardy_password
      DB_NAME: jeopardy_db
      DB_PORT: "5432"
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
